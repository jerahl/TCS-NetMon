            - uuid: d40cb1b169664db292e0e55717b5f9a2
              name: 'Cam [{#CAM.NAME}]: Last modified'
              type: DEPENDENT
              key: 'milestone.cam.lastmodified[{#CAM.ID}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.lastModified
              master_item:
                key: 'milestone.cam.raw[{#CAM.ID}]'
              tags:
                - tag: camera
                  value: '{#CAM.NAME}'
                - tag: component
                  value: camera
            - uuid: 3360329a96ca4f51a0b02cb1fd54d296
              name: 'Cam [{#CAM.NAME}]: MAC address'
              type: DEPENDENT
              key: 'milestone.cam.mac[{#CAM.ID}]'
              value_type: CHAR
              description: |
                MAC address of this camera's parent hardware, normalised
                to AA:BB:CC:DD:EE:FF uppercase form by the batch helper.
                In Milestone the MAC isn't a top-level hardware property
                but a "hardware setting" named MacAddress, so the helper
                pulls it via includeChildren=settings (or per-hardware
                /hardware/{id}/settings calls if the API version doesn't
                support inline settings). An empty value means Milestone
                has no MAC recorded for that hardware — common for ONVIF
                devices the recording server couldn't fully probe — and
                is safe to ignore.
                
                Multi-channel encoders (one hardware, multiple cameras)
                will share a MAC across all child camera items, since
                the MAC belongs to the encoder hardware, not the
                logical channel.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.mac
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'milestone.cam.raw[{#CAM.ID}]'
              tags:
                - tag: camera
                  value: '{#CAM.NAME}'
                - tag: component
                  value: camera
            - uuid: 9a3122b3739b44239aed25195e1a8a6b
              name: 'Cam [{#CAM.NAME}]: Detail (per-camera dependent master)'
              type: DEPENDENT
              key: 'milestone.cam.raw[{#CAM.ID}]'
              history: '0'
              value_type: TEXT
              description: |
                Extracts this camera's record from the batch master. Per-field
                items below depend on this. At 2500 cameras this means zero
                additional API calls per camera — everything rides on the
                single milestone_cameras_read.sh call.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$["{#CAM.ID}"]'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'milestone_cameras_read.sh[3600]'
              tags:
                - tag: camera
                  value: '{#CAM.NAME}'
                - tag: component
                  value: camera
              trigger_prototypes:
                - uuid: 81a2135069de42b99bdae28df3595c14
                  expression: 'nodata(/Milestone XProtect by HTTP/milestone.cam.raw[{#CAM.ID}],15m)=1'
                  name: 'Cam [{#CAM.NAME}]: no data for 15m (API unreachable or removed)'
                  status: DISABLED
                  priority: AVERAGE
                  description: |
                    DISABLED by default — see note above. Use the dashboard's
                    Camera Status honeycomb widget to spot cameras that have
                    stopped reporting.
            - uuid: 6b3d1c9a8f4242b39e0a8e0fcf317e22
              name: 'Cam [{#CAM.NAME}]: Recording server id'
              type: DEPENDENT
              key: 'milestone.cam.rsid[{#CAM.ID}]'
              value_type: CHAR
              description: |
                Recording-server GUID this camera lives on (the
                grandparent of the camera in the XProtect tree:
                ManagementServer > RecordingServer > Hardware >
                Camera). Stamped by milestone_cameras_state.py from
                hw.relations.parent.id. Empty if the API version
                doesn't expose it.
                
                Used by the surveillance dashboard's Sites tab to
                attribute camera groups to their hosting recording
                server (group → cameras → RS).
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.recordingServerId
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'milestone.cam.raw[{#CAM.ID}]'
              tags:
                - tag: camera
                  value: '{#CAM.NAME}'
                - tag: component
                  value: camera
            - uuid: 03e6a28248d94a4c9f935c7d7c2b03ed
              name: 'Cam [{#CAM.NAME}]: Hardware id'
              type: DEPENDENT
              key: 'milestone.cam.rs[{#CAM.ID}]'
              value_type: CHAR
              description: |
                The parent hardware GUID. Note: a camera's relations.parent
                is the hardware object, not the recording server (which is
                the grandparent). Per-Milestone-engineer guidance on the MIP
                forum. Item key is kept as 'milestone.cam.rs' for
                backward-compatibility with existing history.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.relations.parent.id
              master_item:
                key: 'milestone.cam.raw[{#CAM.ID}]'
              tags:
                - tag: camera
                  value: '{#CAM.NAME}'
                - tag: component
                  value: camera
            - uuid: 9ece2ec4ba874c549d87dcd5af519e52
              name: 'Cam [{#CAM.NAME}]: Status (combined)'
              type: CALCULATED
              key: 'milestone.cam.status[{#CAM.ID}]'
              delay: '{$MILESTONE.CAM.PING.INTERVAL}'
              value_type: FLOAT
              params: |
                (last(//milestone.cam.enabled[{#CAM.ID}])="false")*-1
                + (last(//milestone.cam.enabled[{#CAM.ID}])="true")*(
                    (max(last_foreach(/*/icmpping?[tag="cam_id:{#CAM.ID}"]))=0)*2
                    + (length(last(//milestone.cam.ess.comm.type[{#CAM.ID}]))>0
                       and last(//milestone.cam.ess.comm.type[{#CAM.ID}])<>"{$MILESTONE.ESS.TYPE.COMMUNICATION_OK}")*1
                    + (max(last_foreach(/*/zabbix[host,snmp,available]?[tag="cam_id:{#CAM.ID}"]))=0)*4
                  )
              description: |
                Combined health score for honeycomb display, folding
                three independent signals into one value:
                
                  bit 0 (+1)  ESS communication state != OK GUID
                  bit 1 (+2)  ICMP unreachable
                  bit 2 (+4)  SNMP availability = 0 (down)
                
                Values:
                  -1  Disabled in XProtect
                   0  OK (all three signals OK)
                   1  ESS comm fault only
                   2  ICMP unreachable, ESS still OK
                   3  Offline (ICMP + ESS)
                   4  SNMP fault only (ping + ESS OK)
                   5  SNMP + ESS fault
                   6  SNMP + ICMP fault
                   7  Offline (all three down)
                
                Cross-host items are looked up via the cam_id tag the
                host_prototype stamps on every per-camera Zabbix host
                (G4 + G23). last() with the ?[tag="..."] selector
                returns the value from the single matching host;
                zabbix[host,snmp,available] there reports 0 (down),
                1 (up), or 2 (unknown — no SNMP items configured, no
                penalty applied).
              valuemap:
                name: 'Camera status'
              tags:
                - tag: camera
                  value: '{#CAM.NAME}'
                - tag: component
                  value: camera-status
                - tag: view
                  value: status-all
          trigger_prototypes:
            - uuid: a7aeb84a29464b9eacfae1cd0ab3f199
              expression: 'last(/Milestone XProtect by HTTP/milestone.cam.ess.comm.type[{#CAM.ID}])<>"{$MILESTONE.ESS.TYPE.COMMUNICATION_OK}" and last(/Milestone XProtect by HTTP/milestone.cam.enabled[{#CAM.ID}])="true" and length(last(/Milestone XProtect by HTTP/milestone.cam.ess.comm.type[{#CAM.ID}]))>0'
              name: 'Cam [{#CAM.NAME}]: communication not OK (per last ESS snapshot)'
              status: DISABLED
              priority: HIGH
              description: |
                DISABLED by default — see note above. Camera is enabled in
                XProtect but the last ESS snapshot reported a communication
                -state type other than the "OK" GUID. Requires
                {$MILESTONE.ESS.TYPE.COMMUNICATION_OK} and
                {$MILESTONE.ESS.STATEGROUP.COMMUNICATION} to be set
                on the host.
            - uuid: dd5ec3cfb9df49ca94ade9ce299c15f6
              expression: 'last(/Milestone XProtect by HTTP/milestone.cam.ess.rec.type[{#CAM.ID}])<>"{$MILESTONE.ESS.TYPE.RECORDING_STARTED}" and last(/Milestone XProtect by HTTP/milestone.cam.enabled[{#CAM.ID}])="true" and length(last(/Milestone XProtect by HTTP/milestone.cam.ess.rec.type[{#CAM.ID}]))>0'
              name: 'Cam [{#CAM.NAME}]: not recording (per last ESS snapshot)'
              status: DISABLED
              priority: AVERAGE
              description: |
                DISABLED by default — see note above. Camera is enabled but
                the last ESS snapshot reported a recording-state type other
                than the "Started" GUID. Requires
                {$MILESTONE.ESS.TYPE.RECORDING_STARTED} and
                {$MILESTONE.ESS.STATEGROUP.RECORDING} to be set.
          host_prototypes:
            - uuid: 481d66ed2de544388bc481cd69a1679d
              host: 'Camera-{#CAM.HW.ID}'
              name: '{#CAM.HW.NAME} ({#CAM.HW.IP})'
              group_links:
                - group:
                    name: 'Discovered hosts/Milestone Cameras'
              templates:
                - name: 'Milestone Camera by Direct Polling'
              tags:
                - tag: cam_hw_id
                  value: '{#CAM.HW.ID}'
                - tag: cam_id
                  value: '{#CAM.ID}'
                - tag: site
                  value: '{$MILESTONE.SITE.NAME}'
                - tag: vendor
                  value: '{#CAM.HW.VENDOR}'
              custom_interfaces: 'YES'
              interfaces:
                - type: SNMP
                  ip: '{#CAM.HW.IP}'
                  port: '161'
                  details:
                    community: '{$MS.CAM.SNMP.COMMUNITY}'
          master_item:
            key: 'milestone_cameras_read.sh[3600]'
          lld_macro_paths:
            - lld_macro: '{#CAM.ADDRESS}'
              path: $.address
            - lld_macro: '{#CAM.ENABLED}'
              path: $.enabled
            - lld_macro: '{#CAM.HW.ID}'
              path: $.hardwareId
            - lld_macro: '{#CAM.HW.IP}'
              path: $.address
            - lld_macro: '{#CAM.HW.MODEL}'
              path: $.hardwareModel
            - lld_macro: '{#CAM.HW.NAME}'
              path: $.hardwareName
            - lld_macro: '{#CAM.HW.VENDOR}'
              path: $.vendor
            - lld_macro: '{#CAM.ID}'
              path: $.id
            - lld_macro: '{#CAM.MAC}'
              path: $.mac
            - lld_macro: '{#CAM.NAME}'
              path: $.displayName
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.__array[*]'
            - type: JAVASCRIPT
              parameters:
                - |
                  // Synthesise per-camera 'vendor' field from hardwareModel
                  // so the host_prototype LLD override can gate the Bosch
                  // sub-template on it. Regex is case-insensitive and
                  // prefix-tolerant (per M0_Bosch_Fleet_Compatibility.md
                  // §2 — fleet model strings include 'Bosch ', 'BOSCH ',
                  // and no-prefix variants of the same physical model).
                  var arr = JSON.parse(value);
                  for (var i = 0; i < arr.length; i++) {
                    var m = String(arr[i].hardwareModel || '').toLowerCase();
                    if (/^(?:bosch\s+)?(?:flexidome|dinion|autodome|nbn|nde|ndp|nds|ndv|nin|nbe|ntc)/.test(m)) {
                      arr[i].vendor = 'bosch';
                    } else if (/axis/.test(m)) {
                      arr[i].vendor = 'axis';
                    } else if (/hanwha|samsung/.test(m)) {
                      arr[i].vendor = 'hanwha';
                    } else if (/hikvision|hik\b/.test(m)) {
                      arr[i].vendor = 'hikvision';
                    } else if (/dahua/.test(m)) {
                      arr[i].vendor = 'dahua';
                    } else {
                      arr[i].vendor = 'other';
                    }
                  }
                  return JSON.stringify(arr);
          overrides:
            - name: 'Link Bosch sub-template for Bosch cameras'
              step: '1'
              filter:
                evaltype: AND
                conditions:
                  - macro: '{#CAM.HW.VENDOR}'
                    value: ^bosch$
              operations:
                - operationobject: HOST_PROTOTYPE
                  operator: REGEXP
                  value: ^Camera-
                  templates:
                    - name: 'Milestone Camera vendor - Bosch'
        - uuid: 4a3e6d2c19b7402a83b1ce8d27f455a1
          name: 'Milestone: Camera group discovery'
          type: DEPENDENT
          key: milestone.groups.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#GRP.NAME}'
                value: '{$MILESTONE.GRP.NAME.MATCHES}'
              - macro: '{#GRP.NAME}'
                value: '{$MILESTONE.GRP.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: |
            Discovers Milestone camera groups (the "sites" axis Smart
            Client uses). Each group becomes a row with cameraCount /
            hardwareCount surfaced as dependent items below.
            
            No host_prototype here by design (Plan v1.3, operator
            choice) — groups are organisational, not addressable
            hosts, so they live as LLD items only.
          item_prototypes:
            - uuid: c8b5e9d72143460faa9f31de8b76c104
              name: 'Group [{#GRP.NAME}]: Camera count'
              type: DEPENDENT
              key: 'milestone.grp.cam.count[{#GRP.ID}]'
