        - macro: '{$MILESTONE.SITE.NAME}'
          description: 'Human-readable site name. Stamped onto every per-camera host as a "site" tag (per Plan v1.2 §C7 tag schema). Set to e.g. "BryantHS" / "AustinES" per-host or globally.'
        - macro: '{$MILESTONE.USER}'
          description: 'XProtect Basic user name.'
        - macro: '{$MS.CAM.SNMP.COMMUNITY}'
          type: SECRET_TEXT
          description: 'SNMPv1/v2c community for the per-camera host SNMP interface. Operator sets this once at the host_prototype level (template macro override on the Site host).'
