                    - $.cameraCount
              master_item:
                key: 'milestone.grp.raw[{#GRP.ID}]'
              tags:
                - tag: component
                  value: group
                - tag: group
                  value: '{#GRP.NAME}'
            - uuid: e7f1c8b3d2904e95a5d4e6c19b8a3f7d
              name: 'Group [{#GRP.NAME}]: Hardware count'
              type: DEPENDENT
              key: 'milestone.grp.hw.count[{#GRP.ID}]'
              description: |
                Distinct parent-hardware count for cameras in this
                group. Multi-channel encoders share a hardware row, so
                hardwareCount <= cameraCount for groups that include
                encoder channels.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.hardwareCount
              master_item:
                key: 'milestone.grp.raw[{#GRP.ID}]'
              tags:
                - tag: component
                  value: group
                - tag: group
                  value: '{#GRP.NAME}'
            - uuid: ad7e9c3b5f6a4180b1c2eafd57293ee0
              name: 'Group [{#GRP.NAME}]: Name'
              type: DEPENDENT
              key: 'milestone.grp.name[{#GRP.ID}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.name
              master_item:
                key: 'milestone.grp.raw[{#GRP.ID}]'
              tags:
                - tag: component
                  value: group
                - tag: group
                  value: '{#GRP.NAME}'
            - uuid: 9c52a13bf0e84217a4c8f0d6b2e3915c
              name: 'Group [{#GRP.NAME}]: Detail (per-group dependent master)'
              type: DEPENDENT
              key: 'milestone.grp.raw[{#GRP.ID}]'
              history: '0'
              value_type: TEXT
              description: |
                Extracts this group's record from the batch master. Per-
                field items below depend on this so value-cache lookups
                stay local — same pattern as milestone.cam.raw and
                milestone.rs.raw.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$["{#GRP.ID}"]'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'milestone_groups_read.sh[3600]'
              tags:
                - tag: component
                  value: group
                - tag: group
                  value: '{#GRP.NAME}'
          master_item:
            key: 'milestone_groups_read.sh[3600]'
          lld_macro_paths:
            - lld_macro: '{#GRP.CAMERA_COUNT}'
              path: $.cameraCount
            - lld_macro: '{#GRP.HARDWARE_COUNT}'
              path: $.hardwareCount
            - lld_macro: '{#GRP.ID}'
              path: $.id
            - lld_macro: '{#GRP.NAME}'
              path: $.name
            - lld_macro: '{#GRP.PARENT_ID}'
              path: $.parentGroupId
            - lld_macro: '{#GRP.PATH}'
              path: $.path
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.__array[*]'
        - uuid: 3f88ab587d5048fd8698550a4f951d01
          name: 'Milestone: Recording Server discovery'
          type: DEPENDENT
          key: milestone.recordingservers.discovery
          lifetime: 2d
          item_prototypes:
            - uuid: 2029189a6ee14ed4825d57c2f220dd77
              name: 'RS [{#RS.NAME}]: Enabled'
              type: DEPENDENT
              key: 'milestone.rs.enabled[{#RS.ID}]'
              value_type: CHAR
              valuemap:
                name: 'Bool string'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.enabled
                - type: JAVASCRIPT
                  parameters:
                    - 'return String(value).toLowerCase();'
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'
              trigger_prototypes:
                - uuid: ec5e8bfc0dfe4d379cfaef1a175fbab6
                  expression: 'last(/Milestone XProtect by HTTP/milestone.rs.enabled[{#RS.ID}])="false"'
                  name: 'RS [{#RS.NAME}]: disabled in XProtect'
                  priority: WARNING
            - uuid: de55563163be4052a1ca21e0df9498fb
              name: 'RS [{#RS.NAME}]: Seconds since last handshake'
              type: DEPENDENT
              key: 'milestone.rs.handshake.age[{#RS.ID}]'
              units: s
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.lastStatusHandshake
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (!value) return 0;
                      var ts = Date.parse(value);
                      if (isNaN(ts)) return 0;
                      return Math.floor((Date.now() - ts) / 1000);
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'
              trigger_prototypes:
                - uuid: ab618965918645129964db3a3fb34de9
                  expression: 'last(/Milestone XProtect by HTTP/milestone.rs.handshake.age[{#RS.ID}])>300'
                  name: 'RS [{#RS.NAME}]: handshake stale (>5m)'
                  priority: HIGH
                  description: |
                    The recording server has not checked in with the management
                    server in the last 5 minutes. The server or recorder service
                    may be down.
            - uuid: 95686a1bc70a41aba2c69fe74560ad9a
              name: 'RS [{#RS.NAME}]: Host name'
              type: DEPENDENT
              key: 'milestone.rs.hostname[{#RS.ID}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.hostName
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'
            - uuid: e3f73eb528b14aa59ad51c3a6479dac6
              name: 'RS [{#RS.NAME}]: Last handshake'
              type: DEPENDENT
              key: 'milestone.rs.lasthandshake[{#RS.ID}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.lastStatusHandshake
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'
            - uuid: 6574c1c3cb684630a5f469181c7824c4
              name: 'RS [{#RS.NAME}]: Detail (per-RS dependent master)'
              type: DEPENDENT
              key: 'milestone.rs.raw[{#RS.ID}]'
              history: '0'
              value_type: TEXT
              description: |
                Extracts this RS's record from the batch master. Per-field
                items below depend on this so value-cache lookups stay local.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$["{#RS.ID}"]'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: milestone.rs.getall
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'
              trigger_prototypes:
                - uuid: 509f5e38e5b14063b6b1dca43003483e
                  expression: 'nodata(/Milestone XProtect by HTTP/milestone.rs.raw[{#RS.ID}],15m)=1'
                  name: 'RS [{#RS.NAME}]: no API data for 15m'
                  priority: AVERAGE
            - uuid: e985ec7b69414435bde4c0bea79c18a7
              name: 'RS [{#RS.NAME}]: Version'
              type: DEPENDENT
              key: 'milestone.rs.version[{#RS.ID}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.version
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'
          master_item:
            key: milestone.rs.getall
          lld_macro_paths:
            - lld_macro: '{#RS.DESCRIPTION}'
              path: $.description
            - lld_macro: '{#RS.ID}'
              path: $.id
            - lld_macro: '{#RS.NAME}'
              path: $.displayName
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var obj = JSON.parse(value);
                  var out = [];
                  for (var k in obj) {
                    if (obj.hasOwnProperty(k)) out.push(obj[k]);
                  }
                  return JSON.stringify(out);
            - type: JSONPATH
              parameters:
                - '$.[*]'
      macros:
        - macro: '{$MILESTONE.CAM.NAME.MATCHES}'
          value: '.*'
